name = "mekko-invest"
main = ".open-next/worker.js"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# Static assets served by the Worker (generated by OpenNext)
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Cloudflare D1 database binding.
# Create it once with:  wrangler d1 create mekko-invest-db
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "mekko-invest-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

[vars]
# Non-secret vars go here. Secrets (e.g. auth pepper) use:
#   wrangler secret put AUTH_SECRET
